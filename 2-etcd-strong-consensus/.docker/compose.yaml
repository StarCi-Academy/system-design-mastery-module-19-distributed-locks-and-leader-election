name: 2-etcd-strong-consensus

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: 2-etcd-strong-consensus-etcd
    command:
      - etcd
      - --name=etcd0
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://etcd:2380
    networks:
      - 2-etcd-strong-consensus-network

  api:
    container_name: 2-etcd-strong-consensus-api
    image: starciacademy/system-design-2-etcd-strong-consensus-api:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ETCD_HOSTS=etcd:2379
    depends_on:
      - etcd
    networks:
      - 2-etcd-strong-consensus-network

networks:
  2-etcd-strong-consensus-network:
    name: 2-etcd-strong-consensus-network
